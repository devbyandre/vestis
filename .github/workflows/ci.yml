name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-test.txt
      - run: |
          PYTHONPATH=app pytest tests/test_unit.py -v --tb=short \
            --cov=app --cov-report=xml:coverage.xml
      - uses: codecov/codecov-action@v5
        with:
          file: coverage.xml
        continue-on-error: true

  integration-sqlite:
    name: Integration Tests (SQLite)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=app pytest tests/test_integration.py -v --tb=short

  integration-postgres:
    name: Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vestis_test
          POSTGRES_USER: vestis
          POSTGRES_PASSWORD: ci_throwaway_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Init schema and run tests
        env:
          DATABASE_URL: postgresql://vestis:ci_throwaway_password@localhost:5432/vestis_test
        run: |
          PYTHONPATH=app python app/setup/db_init.py
          PYTHONPATH=app pytest tests/test_integration.py -v --tb=short

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [integration-sqlite, integration-postgres]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=app pytest tests/test_smoke.py -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.2
      - run: docker build -t vestis:${{ github.sha }} .
      - run: |
          docker run --rm \
            -e DATABASE_URL=sqlite:////tmp/smoke.db \
            vestis:${{ github.sha }} \
            python -c "import db_utils; print('DB module OK')"
