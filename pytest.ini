[pytest]
# Root of the project
testpaths = tests

# Markers
markers =
    unit:        Pure business logic — no DB, no network (fast, safe for pre-commit)
    integration: Requires a database connection (SQLite in CI, Postgres locally)
    smoke:       App startup and module import checks

# Output
addopts =
    -v
    --tb=short
    --strict-markers

# Fail fast in CI — comment out locally if you want to see all failures
# addopts = -x
