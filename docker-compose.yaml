services:

  # ─────────────────────────────────────────
  # PostgreSQL database
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: stockapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockapp}
      POSTGRES_USER: ${POSTGRES_USER:-stockapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}   # required – set in .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # DB init (runs once, then exits)
  # ─────────────────────────────────────────
  db-init:
    build: .
    container_name: stockapp-db-init
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stockapp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stockapp}
    command: sh -c "cd /app && PYTHONPATH=/app python setup/db_init.py"

  # ─────────────────────────────────────────
  # Streamlit dashboard
  # ─────────────────────────────────────────
  app:
    build: .
    networks:
      - default
      - coolify_net
    container_name: stockapp-ui
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8501}:8501"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stockapp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stockapp}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./config.json:/app/config.json:ro   # mount your config (optional)
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  # data_fetcher – runs on a schedule via supercronic
  # ─────────────────────────────────────────
  data-fetcher:
    build: .
    networks:
      - default
      - coolify_net
    container_name: stockapp-fetcher
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stockapp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stockapp}
    volumes:
      - ./config.json:/app/config.json:ro
    command: supercronic /app/cron/fetcher.cron

  # ─────────────────────────────────────────
  # telegram_worker – runs on a schedule via supercronic
  # ─────────────────────────────────────────
  telegram-worker:
    build: .
    networks:
      - default
      - coolify_net
    container_name: stockapp-telegram
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stockapp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stockapp}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./config.json:/app/config.json:ro
    command: supercronic /app/cron/telegram.cron

volumes:
  pgdata: